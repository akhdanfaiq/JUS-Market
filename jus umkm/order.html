<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Fresh Juice Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5A9CB5',
                        secondary: '#FACE68',
                        tertiary: '#FAAC68',
                        accent: '#FA6868'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-primary shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-white">🍹 Fresh Juice Shop</h1>
                <div class="space-x-4">
                    <a href="index.html" class="text-white hover:text-secondary transition">Home</a>
                    <a href="recap.html" class="text-white hover:text-secondary transition">Orders</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Order Form Section -->
    <section class="container mx-auto px-4 py-12">
        <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-3xl font-bold text-center mb-8 text-gray-800">Place Your Order</h2>
            
            <form id="order-form" class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Name</label>
                    <input type="text" id="customer-name" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Phone Number</label>
                    <input type="tel" id="customer-phone" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Address</label>
                    <textarea id="customer-address" required rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Select Product</label>
                    <select id="product-select" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">-- Choose Product --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Quantity</label>
                    <input type="number" id="quantity" min="1" value="1" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="bg-gray-100 p-4 rounded-lg">
                    <div class="flex justify-between items-center">
                        <span class="text-lg font-semibold text-gray-700">Total Price:</span>
                        <span id="total-price" class="text-2xl font-bold text-primary">Rp 0</span>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-3 rounded-lg transition duration-300">
                    Submit Order
                </button>
            </form>
        </div>
    </section>

    <!-- Loading Modal -->
    <div id="loading-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 text-center">
            <div class="loader mb-4"></div>
            <p class="text-gray-700">Processing your order...</p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 text-center max-w-md">
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Order Successful!</h3>
            <p class="text-gray-600 mb-6">Your order has been placed successfully.</p>
            <button onclick="window.location.href='index.html'" 
                    class="bg-primary hover:bg-opacity-90 text-white font-bold py-2 px-6 rounded-lg">
                Back to Home
            </button>
        </div>
    </div>

    <script src="js/order.js"></script>
</body>
</html>
