<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Juice Shop - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5A9CB5',
                        secondary: '#FACE68',
                        tertiary: '#FAAC68',
                        accent: '#FA6868'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-primary shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-white">🍹 Fresh Juice Shop</h1>
                <div class="space-x-4">
                    <a href="index.html" class="text-white hover:text-secondary transition">Home</a>
                    <a href="recap.html" class="text-white hover:text-secondary transition">Orders</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-primary to-tertiary text-white py-16">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-4xl md:text-5xl font-bold mb-4">Fresh & Healthy Juices</h2>
            <p class="text-lg md:text-xl mb-8">100% Natural, No Preservatives</p>
        </div>
    </section>

    <!-- Products Section -->
    <section class="container mx-auto px-4 py-12">
        <h3 class="text-3xl font-bold text-center mb-8 text-gray-800">Our Products</h3>
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Products will be loaded here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Fresh Juice Shop. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
